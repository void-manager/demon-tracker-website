<!DOCTYPE html>
<html>
<head>
    <title>Demon Tracker Global</title>
    <style>
        body { background: #0a0a0a; color: white; font-family: sans-serif; text-align: center; }
        .impossible { color: #ff0000; text-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000; font-weight: bold; }
        table { margin: 50px auto; width: 80%; background: #111; border: 1px solid #333; }
        th, td { padding: 15px; border-bottom: 1px solid #222; }
        th { background: #00ff00; color: black; }
    </style>
</head>
<body>
    <h1>👹 DEMON TRACKER LEADERBOARD 👹</h1>
    <table id="list">
        <tr><th>Rank</th><th>Player</th><th>Skill Points</th></tr>
    </table>
    <script>
        async function load() {
            const res = await fetch('/api/data');
            const data = await res.json();
            const table = document.getElementById('list');
            data.forEach((p, i) => {
                const row = table.insertRow();
                const rank = i + 1;
                // Apply the Neon Red "Impossible" glow to Top 5
                const style = rank <= 5 ? 'class="impossible"' : '';
                row.innerHTML = `<td>${rank}</td><td ${style}>${p.username}</td><td>${p.points}</td>`;
            });
        }
        load();
    </script>
</body>
</html>
