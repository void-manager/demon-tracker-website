<!DOCTYPE html>
<html>
<head>
    <title>Demon Tracker | Global</title>
    <style>
        :root { --neon: #ff0044; --gd-green: #00ff44; }
        body { background: #0c0c0c; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; }
        .impossible { color: var(--neon); text-shadow: 0 0 10px var(--neon); font-weight: 900; }
        table { width: 80%; margin: 20px auto; background: #151515; border-radius: 10px; }
        th { background: var(--gd-green); color: black; padding: 15px; }
        td { padding: 12px; border-bottom: 1px solid #222; }
        select { background: #333; color: white; padding: 10px; border: 1px solid var(--gd-green); margin: 20px; }
    </style>
</head>
<body>
    <h1>👹 DEMON TRACKER LEADERBOARD 👹</h1>
    
    <select id="wayback" onchange="loadBoard(this.value)">
        <option value="latest">LIVE RANKINGS</option>
    </select>

    <table>
        <thead><tr><th>Rank</th><th>Player</th><th>Skill Points</th></tr></thead>
        <tbody id="list"></tbody>
    </table>

    <script>
        async function loadBoard(date = 'latest') {
            const res = await fetch(`/api/data?date=${date}`);
            const data = await res.json();
            const list = document.getElementById('list');
            const wayback = document.getElementById('wayback');
            
            list.innerHTML = data.players.map((p, i) => {
                const rank = i + 1;
                const style = rank <= 5 ? 'class="impossible"' : '';
                return `<tr><td>${rank}</td><td ${style}>${p.username}</td><td>${p.points}</td></tr>`;
            }).join('');

            if (wayback.options.length <= 1) {
                data.dates.forEach(d => wayback.add(new Option(d, d)));
            }
        }
        loadBoard();
    </script>
</body>
</html>
